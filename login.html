<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KeyVault — Iniciar sesión</title>
  <meta name="description" content="Accede a tu gestor de contraseñas seguro.">
  <link rel="icon" href="/icono.jpg" type="image/jpeg">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">

      <div class="login-logo">
        <div class="icon-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
          </svg>
        </div>
        <h1>KeyVault</h1>
        <p>Tu gestor de contraseñas local</p>
      </div>

      <!-- FORMULARIO LOGIN -->
      <form class="login-form" id="login-form">
        <div class="field">
          <label>Usuario</label>
          <div class="input-icon-wrap">
            <span class="icon-left">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input id="login-user" type="text" class="input" placeholder="Tu nombre de usuario" autocomplete="username">
          </div>
        </div>
        <div class="field">
          <label>Contraseña</label>
          <div class="input-icon-wrap">
            <span class="icon-left">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input id="login-pass" type="password" class="input" placeholder="Tu contraseña maestra" autocomplete="current-password">
            <span class="icon-right toggle-password">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </span>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Iniciar sesión</button>
        <div class="login-divider">o</div>
        <p class="login-footer">¿No tienes cuenta? <a href="#" id="show-register">Crear cuenta</a></p>
      </form>

      <!-- FORMULARIO REGISTRO -->
      <form class="login-form hidden" id="register-form">
        <div class="field">
          <label>Usuario</label>
          <div class="input-icon-wrap">
            <span class="icon-left">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input id="reg-user" type="text" class="input" placeholder="Elige un nombre de usuario" autocomplete="username">
          </div>
        </div>
        <div class="field">
          <label>Contraseña maestra</label>
          <div class="input-icon-wrap">
            <span class="icon-left">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input id="reg-pass" type="password" class="input" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
            <span class="icon-right toggle-password">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </span>
          </div>
        </div>
        <div class="field">
          <label>Confirmar contraseña</label>
          <div class="input-icon-wrap">
            <span class="icon-left">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input id="reg-confirm" type="password" class="input" placeholder="Repite tu contraseña" autocomplete="new-password">
            <span class="icon-right toggle-password">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </span>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Crear cuenta</button>
        <div class="login-divider">o</div>
        <p class="login-footer">¿Ya tienes cuenta? <a href="#" id="show-login">Iniciar sesión</a></p>
      </form>

    </div>
  </div>

  <script src="/js/passwords.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
